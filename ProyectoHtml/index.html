<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Servidor</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="container">
        <h1>Sistema de Monitoreo</h1>

        <form id="monitorForm" class="card">
            <h2>Ingreso de Datos</h2>

            <label for="idServidor">ID del Servidor</label>
            <input id="idServidor" type="text" required>

            <label for="cpu">Carga de CPU (%)</label>
            <input id="cpu" type="number" min="0" max="100" step="0.01" required>

            <label for="temperatura">Temperatura del Rack (°C)</label>
            <input id="temperatura" type="number" step="0.01" required>

            <label for="energia">Consumo de Energía (W)</label>
            <input id="energia" type="number" min="0" step="0.01" required>

            <button type="submit" class="button">Generar Reporte</button>
        </form>

        <section id="resultado" class="card hidden" aria-live="polite">
            <h2>Reporte del Sistema de Monitoreo</h2>

            <p><strong>ID del Servidor:</strong> <span id="outId"></span></p>
            <p><strong>Carga de CPU:</strong> <span id="outCpu"></span></p>
            <p><strong>Temperatura del Rack:</strong> <span id="outTemp"></span></p>
            <p><strong>Consumo de Energía:</strong> <span id="outEnergia"></span></p>

            <hr>

            <h3>Control de Energía</h3>
            <p id="controlEnergia"></p>

            <h3>Estado del Servidor</h3>
            <p id="estadoServidor"></p>

            <h3>Capacidad de Reserva</h3>
            <p id="capacidadReserva"></p>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
